apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-cockpit
  labels:
    app: agent-cockpit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-cockpit
  template:
    metadata:
      labels:
        app: agent-cockpit
    spec:
      hostNetwork: true
      containers:
        - name: agent-cockpit
          image: agent-cockpit:latest
          imagePullPolicy: Never
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - containerPort: 5000
              hostPort: 5000
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          env:
            - name: HOME
              value: "/host-home"
            - name: TMUX
              value: "/tmp/tmux-1000/default,0,0"
          volumeMounts:
            - name: tmux-socket
              mountPath: /tmp/tmux-1000
              readOnly: false
            - name: ssh-keys
              mountPath: /host-home/.ssh
              readOnly: true
            - name: home-dir
              mountPath: /host-home
              readOnly: true
      volumes:
        - name: tmux-socket
          hostPath:
            path: /tmp/tmux-1000
            type: Directory
        - name: ssh-keys
          hostPath:
            path: /home/hermes/.ssh
            type: Directory
        - name: home-dir
          hostPath:
            path: /home/hermes
            type: Directory
