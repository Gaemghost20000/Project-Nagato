apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-cockpit
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: cockpit.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-cockpit
                port:
                  number: 80
